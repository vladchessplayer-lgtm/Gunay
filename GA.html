<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Секретное послание для Гюнай</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }
        body {
            background-color: black;
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            padding: 10px;
        }
        /* звёзды */
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.7;
            animation: twinkle 3s infinite alternate;
            pointer-events: none;
        }
        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.2);}
        }
        .sun-moon {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 40px;
            opacity: 0.6;
            animation: float 6s infinite ease-in-out;
            pointer-events: none;
        }
        .moon-star {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 40px;
            opacity: 0.6;
            animation: float 8s infinite reverse;
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .container {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            border: 1px solid rgba(255,215,0,0.3);
            padding: 20px;
            width: 95%;
            max-width: 800px;
            z-index: 10;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        input, button {
            padding: 12px 20px;
            font-size: 18px;
            margin: 10px;
            border: none;
            border-radius: 40px;
            outline: none;
        }
        input {
            background-color: #222;
            color: white;
            width: 200px;
            text-align: center;
        }
        button {
            background-color: #ff9800;
            color: black;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        button:hover {
            background-color: #ffc107;
            transform: scale(1.02);
        }
        .hidden {
            display: none;
        }
        #hint {
            margin-top: 20px;
            color: #ffaa55;
            font-size: 14px;
        }
        canvas {
            background: #111;
            border-radius: 20px;
            display: block;
            margin: 10px auto;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            width: 100%;
            background-color: #0a0a0a;
            touch-action: none;
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 16px;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0 10px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            margin-bottom: 10px;
        }
        .ctrl-btn {
            background: #333;
            color: white;
            font-size: 32px;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 60px;
cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            min-width: 80px;
            text-align: center;
        }
        .ctrl-btn:active {
            background: #ff9800;
            transform: scale(0.95);
        }
        .reset-game {
            background-color: #444;
            margin-top: 5px;
            padding: 8px 20px;
        }
        .win-message, .lose-message {
            font-size: 20px;
            margin-top: 15px;
            animation: pulse 1s infinite;
        }
        .lose-message {
            color: #ff6666;
            animation: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); text-shadow: 0 0 10px #ffaa33; }
            100% { transform: scale(1); }
        }
        .current-word {
            font-size: 22px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 6px 12px;
            border-radius: 60px;
        }
        max-width: 600px {
            .ctrl-btn { font-size: 28px; padding: 8px 20px; min-width: 70px; }
            .current-word { font-size: 18px; }
            .game-info { font-size: 14px; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>
<div id="starsContainer"></div>
<div class="sun-moon">🌞🌙</div>
<div class="moon-star">🌙✨</div>

<div id="passwordPage" class="container">
    <h1>🌞 Введи пароль 🌙</h1>
    <input type="text" id="passwordInput" placeholder="Пароль" autocomplete="off">
    <button onclick="checkPassword()">Войти</button>
    <div id="hint"></div>
    <footer>Подсказка через 10 секунд</footer>
</div>

<div id="gamePage" class="container hidden">
    <h1 style="font-size: 1.5rem;">✨ Собери слово ✨</h1>
    <div class="current-word" id="currentWordDisplay">Ты ...</div>
    <canvas id="gameCanvas"></canvas>
    <div class="game-info">
        <span>🔤 Собрано: <span id="collectedCount">0</span> / <span id="totalCount">0</span></span>
        <span>📖 Слово <span id="wordIndex">1</span> / <span id="totalWords">6</span></span>
    </div>
    <div class="controls">
        <div class="ctrl-btn" id="leftBtn">←</div>
        <div class="ctrl-btn" id="rightBtn">→</div>
    </div>
    <button id="resetGameBtn" class="reset-game">⟳ Заново</button>
    <div id="messageArea" class="win-message"></div>
</div>

<script>
    // ----- ЗВЁЗДЫ -----
    function createStars() {
        const container = document.getElementById('starsContainer');
        for (let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.classList.add('star');
            let size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    }
    createStars();

    // ----- ПАРОЛЬ -----
    let hintTimer;
    const correctPassword = "Гюнай";

    function startHintTimer() {
        hintTimer = setTimeout(() => {
            document.getElementById('hint').innerHTML = "🌙 Подсказка: Солнце и Луна вместе — это... 🌞";
        }, 10000);
    }

    function checkPassword() {
        const input = document.getElementById('passwordInput').value.trim();
        if (input === correctPassword) {
            clearTimeout(hintTimer);
            document.getElementById('passwordPage').classList.add('hidden');
            document.getElementById('gamePage').classList.remove('hidden');
            startGame();
        } else {
            alert("Неверный пароль, попробуй ещё раз");
        }
    }
    startHintTimer();

    // ----- ИГРА С ДИНАМИЧЕСКИМИ РАЗМЕРАМИ -----
    const adjectives = ["Добрая", "Щедрая", "Честная", "Красивая", "Умная", "Солнечная"];
    let currentWordIndex = 0;
    let currentWord = adjectives[currentWordIndex];
    let currentLetters = currentWord.split('');
    let currentTargetIndex = 0;
    let collectedLetters = [];
    let gameRunning = true;
    let animationId = null;

    let fallingLetters = [];
    let frame = 0;
    const SPAWN_DELAY = 45;

    let canvas = document.getElementById('gameCanvas');
    let ctx = canvas.getContext('2d');
    let canvasWidth = 0, canvasHeight = 0;
    
    // Параметры героя (будут пересчитываться при каждом resize)
    let heroX = 0;
    let heroWidth = 0;
    let heroHeight = 0;
    let heroY = 0;
    let heroSpeed = 0;
    
    let leftPressed = false;
    let rightPressed = false;
    
    // Обновление размеров canvas и пересчёт параметров
    function resizeCanvas() {
        // Задаём canvas размеры: ширина 100% от родителя, высота 60% от высоты окна
        let container = document.querySelector('#gamePage .container');
        let maxWidth = Math.min(window.innerWidth - 40, 800);
        canvas.style.width = maxWidth + 'px';
        canvas.width = maxWidth;
        // Высота: 55% от высоты экрана, но не менее 300px
        let desiredHeight = Math.max(300, window.innerHeight * 0.55);
        canvas.style.height = desiredHeight + 'px';
        canvas.height = desiredHeight;
        canvasWidth = canvas.width;
        canvasHeight = canvas.height;
        
        // Пересчитываем размеры героя относительно canvas
        heroWidth = canvasWidth * 0.06;   // 6% от ширины
        heroHeight = canvasHeight * 0.08; // 8% от высоты
        heroY = canvasHeight - heroHeight - 10;
        heroSpeed = canvasWidth * 0.01;    // скорость 1% от ширины
        if (heroX === 0) heroX = canvasWidth / 2 - heroWidth/2;
        // ограничиваем героя в пределах canvas
        if (heroX < 5) heroX = 5;
        if (heroX + heroWidth > canvasWidth - 5) heroX = canvasWidth - heroWidth - 5;
        
        // Масштабируем радиус букв
        for (let l of fallingLetters) {
            l.radius = canvasWidth * 0.03;
        }
    }
    
    function updateUI() {
        document.getElementById('collectedCount').innerText = collectedLetters.length;
        document.getElementById('totalCount').innerText = currentLetters.length;
        document.getElementById('wordIndex').innerText = currentWordIndex + 1;
        document.getElementById('totalWords').innerText = adjectives.length;
        document.getElementById('currentWordDisplay').innerHTML = `Ты ... ${currentWord}`;
    }
    
    function resetGame() {
        gameRunning = true;
        currentWordIndex = 0;
        currentWord = adjectives[currentWordIndex];
        currentLetters = currentWord.split('');
        currentTargetIndex = 0;
        collectedLetters = [];
        fallingLetters = [];
        frame = 0;
        resizeCanvas();  // обновить размеры и сбросить heroX
        heroX = canvasWidth / 2 - heroWidth/2;
        leftPressed = false;
        rightPressed = false;
        updateUI();
        document.getElementById('messageArea').innerHTML = '';
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(gameLoop);
    }
    
    function nextWord() {
        currentWordIndex++;
        if (currentWordIndex < adjectives.length) {
            currentWord = adjectives[currentWordIndex];
            currentLetters = currentWord.split('');
            currentTargetIndex = 0;
            collectedLetters = [];
            fallingLetters = [];
            updateUI();
        } else {
            gameRunning = false;
            document.getElementById('messageArea').innerHTML = '❤️ Ты собрала все слова! Ты удивительная, Гюнай! 🌞🌙 ❤️';
            cancelAnimationFrame(animationId);
        }
    }
    
    function spawnLetter() {
        if (!gameRunning) return;
        if (currentTargetIndex >= currentLetters.length) return;
        let remainingLetters = currentLetters.slice(currentTargetIndex);
        if (remainingLetters.length === 0) return;
        let randomLetter = remainingLetters[Math.floor(Math.random() * remainingLetters.length)];
        let x = Math.random() * (canvasWidth - 40) + 20;
        let radius = canvasWidth * 0.03;
        fallingLetters.push({
            letter: randomLetter,
            x: x,
            y: 0,
            radius: radius
        });
    }
    
    function gameLoop() {
        if (!gameRunning) return;
        frame++;
        if (frame % SPAWN_DELAY === 0) {
            spawnLetter();
        }
        
        if (leftPressed && heroX > 5) heroX -= heroSpeed;
        if (rightPressed && heroX + heroWidth < canvasWidth - 5) heroX += heroSpeed;
        
        for (let i = 0; i < fallingLetters.length; i++) {
            let l = fallingLetters[i];
            l.y += canvasHeight * 0.006; // скорость падения относительно высоты
            // Столкновение с героем
            if (l.y + l.radius >= heroY && l.y - l.radius <= heroY + heroHeight &&
                l.x + l.radius >= heroX && l.x - l.radius <= heroX + heroWidth) {
                if (l.letter === currentLetters[currentTargetIndex]) {
                    collectedLetters.push(l.letter);
                    currentTargetIndex++;
                    updateUI();
                    fallingLetters.splice(i,1);
                    i--;
                    if (currentTargetIndex === currentLetters.length) {
                        if (currentWordIndex + 1 < adjectives.length) {
                            nextWord();
                        } else {
                            gameRunning = false;
                            document.getElementById('messageArea').innerHTML = '❤️ Ты собрала все слова! Ты удивительная, Гюнай! 🌞🌙 ❤️';
                            cancelAnimationFrame(animationId);
                            return;
                        }
                    }
                } else {
                    gameRunning = false;
                    document.getElementById('messageArea').innerHTML = '❌ Игра окончена! Ты ошиблась. Начни заново. ❌';
                    cancelAnimationFrame(animationId);
                    return;
                }
            } else if (l.y + l.radius > canvasHeight) {
                fallingLetters.splice(i,1);
                i--;
            }
        }
        draw();
        animationId = requestAnimationFrame(gameLoop);
    }
    
    function draw() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        
        // Герой
        ctx.fillStyle = '#ffaa33';
        ctx.fillRect(heroX, heroY, heroWidth, heroHeight);
        ctx.fillStyle = 'black';
        let fontSize = Math.max(16, heroHeight * 0.6);
        ctx.font = `${fontSize}px Arial`;
        ctx.fillText('😊', heroX + heroWidth*0.25, heroY + heroHeight*0.7);
        
        // Буквы
        for (let l of fallingLetters) {
            ctx.fillStyle = '#ffcc66';
            ctx.beginPath();
            ctx.arc(l.x, l.y, l.radius, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = 'black';
            let letterFont = Math.max(14, l.radius * 0.9);
            ctx.font = `bold ${letterFont}px monospace`;
            ctx.fillText(l.letter, l.x - l.radius*0.5, l.y + l.radius*0.3);
        }
        
        // Статистика на canvas
        ctx.fillStyle = 'white';
        let statFont = Math.max(12, canvasWidth * 0.03);
        ctx.font = `${statFont}px monospace`;
        ctx.fillText('Собрано: ' + collectedLetters.join(''), 10, 30);
        ctx.fillStyle = '#aaa';
        ctx.fillText('Нужно: ' + currentWord, 10, 60);
    }
    
    // Управление
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') leftPressed = true;
        if (e.key === 'ArrowRight') rightPressed = true;
    });
    document.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft') leftPressed = false;
        if (e.key === 'ArrowRight') rightPressed = false;
    });
    
    document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); leftPressed = true; });
    document.getElementById('leftBtn').addEventListener('touchend', (e) => { e.preventDefault(); leftPressed = false; });
    document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); rightPressed = true; });
    document.getElementById('rightBtn').addEventListener('touchend', (e) => { e.preventDefault(); rightPressed = false; });
    document.getElementById('leftBtn').addEventListener('mousedown', () => leftPressed = true);
    document.getElementById('leftBtn').addEventListener('mouseup', () => leftPressed = false);
    document.getElementById('rightBtn').addEventListener('mousedown', () => rightPressed = true);
    document.getElementById('rightBtn').addEventListener('mouseup', () => rightPressed = false);
    
    document.getElementById('resetGameBtn').addEventListener('click', () => {
        if (animationId) cancelAnimationFrame(animationId);
        resetGame();
    });
    
    function startGame() {
        resetGame();
        window.addEventListener('resize', () => {
            if (gameRunning) {
                resizeCanvas();
            }
        });
    }
</script>
</body>
</html>
